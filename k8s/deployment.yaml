apiVersion: apps/v1
kind: Deployment
metadata:
  name: myflaskapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myflaskapp
  template:
    metadata:
      labels:
        app: myflaskapp
    spec:
      containers:
        - name: myflaskapp
          image: myflaskacr01.azurecr.io/myflaskapp:1.2
          ports:
            - containerPort: 5000
          imagePullPolicy: Always
      imagePullSecrets:
        - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: myflaskapp-service
spec:
  type: NodePort
  selector:
    app: myflaskapp
  ports:
    - protocol: TCP
      port: 80        # This is the port exposed internally to AGW
      targetPort: 5000
      nodePort: 30695 # NodePort for AGW to hit