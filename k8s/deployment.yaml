apiVersion: apps/v1
kind: Deployment
metadata:
  name: myflaskapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myflaskapp
  template:
    metadata:
      labels:
        app: myflaskapp
    spec:
      containers:
        - name: myflaskapp
          image: acrvinaymulti01ci.azurecr.io/random-api:latest
          ports:
            - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: myflaskapp-service

spec:
  type: LoadBalancer
  selector:
    app: myflaskapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
