<!DOCTYPE html>
<html>
<head>
    <title>Random String App</title>
</head>
<body>
    <h1>Random String Generator</h1>
    <button id="getRandom">Get Random String</button>
    <p id="result"></p>

    <script>
        async function callApi() {
            // THIS IS WHERE YOUR FETCH GOES
            const res = await fetch("https://52.142.21.155/api/random");
            const data = await res.text();
            document.getElementById("result").innerText = data;
        }

        document.getElementById("getRandom").addEventListener("click", callApi);
    </script>
</body>
</html>
